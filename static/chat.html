<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microlife 智能助手</title>
    <link rel="stylesheet" href="/static/css/chat.css">
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
        window.mermaid = mermaid;
    </script>
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">智能助手(LangGraph版)</div>
        <div id="chat-box">
            <div class="msg agent-msg">
                您好！我是 <b>專屬智能助理</b>。<br>
                我專精於為您解決 醫療產品相關問題：<br><br>
                🔧 <b>硬體支援</b>：設備設置及手冊引導。<br>
                📊 <b>個人健康分析</b>：解讀血壓、血氧等趨勢並提供風險預警。<br><br>
                請輸入您的設備狀態或測量數值，我將為您進行分析。
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="請輸入問題...">
            <button id="sendBtn">送出</button>
        </div>

    </div>
    <div class="research-board">
        <div class="board-header">LangGraph 決策追蹤</div>
        <div id="intent-display" style="font-size: 0.8em; color: #888; margin-bottom: 10px;">系統狀態：就緒</div>
        <div id="graph-container">
            <pre class="mermaid" id="mermaid-graph">
        </pre>
        </div>
    </div>
    <script src="/static/js/chat.js"></script>
    <script>
        async function updateMermaidGraph(code, intent, isEmergency) {
            if (!window.mermaid) return;
            const container = document.getElementById('mermaid-graph');
            container.removeAttribute('data-processed');

            let mermaidCode = code;
            // 修正：對應後端可能的節點名稱
            const activeClass = isEmergency ? 'activeEmergencyNode' : 'activeNode';
            mermaidCode += `\nclass ${intent} ${activeClass}`;

            container.innerHTML = mermaidCode;
            await mermaid.run({ nodes: [container] });
        }
        window.updateMermaidGraph = updateMermaidGraph;
    </script>
</body>

</html>
