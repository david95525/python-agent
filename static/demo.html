<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical AI Assistant Demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- <link rel="stylesheet" href="/static/css/demo.css"> -->
    <style>
        #chat-box {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            padding: 10px;
        }

        .message {
            margin-bottom: 10px;
            padding: 5px;
            border-bottom: 1px dashed #eee;
        }

        .user-msg {
            color: blue;
        }

        .ai-msg {
            color: green;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 4px;
        }
    </style>
</head>

<body>

    <div id="chat-widget-trigger">
        <i class="fas fa-robot"></i>
    </div>

    <div id="chat-container">
        <div id="chat-header">
            <span><i class="fas fa-heartbeat"></i> AI 健康助理</span>
            <i class="fas fa-times" id="close-chat" style="cursor:pointer"></i>
        </div>

        <div id="chat-box">
            <div class="message ai-msg">
                您好！我是您的健康小助手。我已經準備好分析您的血壓紀錄了，請問有什麼我可以幫您的嗎？
            </div>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="請輸入您的問題...">
            <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="/static/js/demo.js"></script>
</body>

</html>
